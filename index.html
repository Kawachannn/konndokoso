==================================*/

const fruitsArea =
document.getElementById("fruits");

const countdown =
document.getElementById("countdown");

const question =
document.getElementById("question");

const choices =
document.getElementById("choices");

const result =
document.getElementById("result");

const summary =
document.getElementById("summary");

const statsBody =
document.getElementById("stats");

const historyBody =
document.getElementById("history");


/*==================================
ゲーム用変数
==================================*/

let currentFruit = null;

let currentColor = null;

let startTime = 0;

let logs = [];

let stats = {};


/*==================================
統計初期化
==================================*/

function initStats(){

stats={};

COLORS.forEach(c=>{

stats[c]={

correct:0,

total:0,

times:[]

};

});

}

initStats();


/*==================================
localStorage
==================================*/

function saveData(){

localStorage.setItem(
"fruitLogs",
JSON.stringify(logs)
);

}

function loadData(){

const data=
localStorage.getItem(
"fruitLogs"
);

if(data){

logs=
JSON.parse(data);

rebuildStats();

}

}

loadData();


/*==================================
配列シャッフル
==================================*/

function shuffle(array){

let arr=[...array];

for(

let i=arr.length-1;

i>0;

i--

){

const j=
Math.floor(

Math.random()

*(i+1)

);

[arr[i],arr[j]]
=
[arr[j],arr[i]];

}

return arr;

}


/*==================================
毎回６色を重複なしで割り当てる
==================================*/

function makeFruitList(){

const shuffledColors=

shuffle(COLORS);

return FRUITS.map(

(fruit,index)=>{

return{

name:fruit.name,

svg:fruit.svg,

color:

shuffledColors[index]

};

}

);

}


/*==================================
日時取得
==================================*/

function nowString(){

const d=new Date();

return

d.getFullYear()

+"/"

+(d.getMonth()+1)

+"/"

+d.getDate()

+" "

+d.getHours()

+":"

+String(

d.getMinutes()

).padStart(2,"0")

+":"

+String(

d.getSeconds()

).padStart(2,"0");

}


/*==================================
履歴から統計を再構築
==================================*/

function rebuildStats(){

initStats();

logs.forEach(log=>{

const color=log.correctColor;

stats[color].total++;

if(log.correct){

stats[color].correct++;

}

stats[color].times.push(

log.time

);

});

}
/*==================================
スタート
==================================*/

function startGame(){

result.innerHTML="";

question.innerHTML="";

choices.innerHTML="";

fruitsArea.innerHTML="";

countdown.innerHTML="";

const displayList=
makeFruitList();

window.currentDisplay=
displayList;

/*--------------------------
果物を表示
--------------------------*/

displayList.forEach(item=>{

const card=
document.createElement("div");

card.className=
"card fade";

card.innerHTML=

item.svg(item.color)

+

`<div class="fruitName">

${item.name}

</div>`;

fruitsArea.appendChild(card);

});

/*--------------------------
出題する果物を決める
--------------------------*/

const target=

displayList[
Math.floor(
Math.random()
*
displayList.length
)
];

currentFruit=
target.name;

currentColor=
target.color;

/*--------------------------
カウントダウン
--------------------------*/

let count=3;

countdown.innerHTML=

`<span>

${count}

</span>`;

const timer=

setInterval(()=>{

count--;

if(count>0){

countdown.innerHTML=

`<span>

${count}

</span>`;

}else{

clearInterval(timer);

countdown.innerHTML="";

hideFruits();

}

},1000);

}


/*==================================
果物を消す
==================================*/

function hideFruits(){

fruitsArea.innerHTML="";

showQuestion();

}
/*==================================
問題表示
==================================*/

function showQuestion(){

question.innerHTML=

`<span class="fade">

🍎 <b>${currentFruit}</b>

は何色でしたか？

</span>`;

showColorButtons();

startTime=performance.now();

}


/*==================================
色ボタン
==================================*/

function showColorButtons(){

choices.innerHTML="";

const buttonColors={

red:"#ff5b5b",

blue:"#4aa8ff",

green:"#5bc95b",

yellow:"#ffd84a",

purple:"#b46cff",

orange:"#ff9d3f"

};

COLORS.forEach(color=>{

const btn=

document.createElement("button");

btn.className="colorBtn";

btn.innerHTML=

COLOR_NAME[color];

btn.style.background=

buttonColors[color];

btn.style.color="white";

btn.style.fontWeight="bold";

btn.style.boxShadow=

"0 4px 10px rgba(0,0,0,.15)";

btn.onmouseenter=()=>{

btn.style.transform=

"scale(1.08)";

};

btn.onmouseleave=()=>{

btn.style.transform=

"scale(1)";

};

btn.onclick=()=>{

answer(color);

};

choices.appendChild(btn);

});

}


/*==================================
回答処理
==================================*/

function answer(selectedColor){

choices.innerHTML="";

const elapsed=

Number(

(

performance.now()

-

startTime

)

/

1000

).toFixed(2);

const correct=

selectedColor===

currentColor;

logs.push({

trial:

logs.length+1,

fruit:

currentFruit,

correctColor:

currentColor,

answerColor:

selectedColor,

correct:

correct,

time:

elapsed,

datetime:

nowString()

});

saveData();

rebuildStats();

updateStats();

if(correct){

result.className=

"correct fade";

result.innerHTML=

"🎉 正解！";

confetti();

}else{

result.className=

"wrong fade";

result.innerHTML=

`❌ 不正解<br>

正解は

<b>

${COLOR_NAME[currentColor]}

</b>

でした`;

shake();

}

/*------------------------

3秒後に次の問題

------------------------*/

setTimeout(()=>{

startGame();

},3000);

}
/*==================================
統計更新
==================================*/

function updateStats(){

let totalTrials = logs.length;

let totalCorrect = 0;

let totalTime = 0;

statsBody.innerHTML = "";

COLORS.forEach(color=>{

const s = stats[color];

totalCorrect += s.correct;

totalTime +=
s.times.reduce((a,b)=>a+b,0);

let rate = 0;

if(s.total>0){

rate =
(
s.correct
/
s.total
*
100
).toFixed(1);

}

statsBody.innerHTML +=

`
<tr>

<td>

${COLOR_NAME[color]}

</td>

<td>

${s.correct}

</td>

<td>

${s.total}

</td>

<td>

${rate}%

</td>

</tr>

`;

});


let overallRate = 0;

if(totalTrials>0){

overallRate =

(

totalCorrect

/

totalTrials

*

100

).toFixed(1);

}

let averageTime = 0;

if(totalTrials>0){

averageTime =

(

totalTime

/

totalTrials

).toFixed(2);

}

summary.innerHTML=

`
<b>

総試行数：

${totalTrials}

</b>

　

<b>

総合正答率：

${overallRate}%

</b>

　

<b>

平均回答時間：

${averageTime} 秒

</b>

`;

updateHistory();

drawRateChart();

drawTimeChart();

}


/*==================================
回答履歴
==================================*/

function updateHistory(){

historyBody.innerHTML="";

logs

.slice()

.reverse()

.forEach(log=>{

historyBody.innerHTML +=

`

<td>

${log.trial}

</td>

<td>

${log.fruit}

</td>

<td>

${COLOR_NAME[log.correctColor]}

</td>

<td>

${COLOR_NAME[log.answerColor]}

</td>

<td>

${

log.correct

"⭕"

:

"❌"

}

</td>

<td>

${log.time}

秒

</td>

<td>

${log.datetime}

</td>

</tr>

`;

});

}
/*==================================
色別正答率グラフ
==================================*/

function drawRateChart(){

const canvas=
document.getElementById("rateChart");

const ctx=
canvas.getContext("2d");

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

const margin=50;
const graphHeight=180;
const barWidth=70;
const gap=60;

COLORS.forEach((color,index)=>{

const s=stats[color];

let rate=0;

if(s.total>0){

rate=
(s.correct/s.total)*100;

}

const x=
margin+
index*
(barWidth+gap);

const h=
graphHeight*
(rate/100);

ctx.fillStyle=color;

ctx.fillRect(

x,

220-h,

barWidth,

h

);

ctx.fillStyle="#333";

ctx.font="16px sans-serif";

ctx.textAlign="center";

ctx.fillText(

COLOR_NAME[color],

x+barWidth/2,

245

);

ctx.fillText(

rate.toFixed(1)+"%",

x+barWidth/2,

205-h

);

});

/*軸*/

ctx.beginPath();

ctx.moveTo(35,30);

ctx.lineTo(35,220);

ctx.lineTo(870,220);

ctx.strokeStyle="#555";

ctx.stroke();

}


/*==================================
平均回答時間グラフ
==================================*/

function drawTimeChart(){

const canvas=
document.getElementById("timeChart");

const ctx=
canvas.getContext("2d");

ctx.clearRect(

0,

0,

canvas.width,

canvas.height

);

const margin=50;
const graphHeight=180;
const barWidth=70;
const gap=60;

/*最大時間*/

let max=3;

COLORS.forEach(color=>{

const arr=
stats[color].times;

if(arr.length){

const avg=

arr.reduce(

(a,b)=>a+b,

0

)

/

arr.length;

if(avg>max){

max=avg;

}

}

});

COLORS.forEach((color,index)=>{

const arr=
stats[color].times;

let avg=0;

if(arr.length){

avg=

arr.reduce(

(a,b)=>a+b,

0

)

/

arr.length;

}

const x=

margin+

index*

(barWidth+gap);

const h=

graphHeight*

(avg/max);

ctx.fillStyle=color;

ctx.fillRect(

x,

220-h,

barWidth,

h

);

ctx.fillStyle="#333";

ctx.font="16px sans-serif";

ctx.textAlign="center";

ctx.fillText(

COLOR_NAME[color],

x+barWidth/2,

245

);

ctx.fillText(

avg.toFixed(2)+"秒",

x+barWidth/2,

205-h

);

});

/*軸*/

ctx.beginPath();

ctx.moveTo(35,30);

ctx.lineTo(35,220);

ctx.lineTo(870,220);

ctx.strokeStyle="#555";

ctx.stroke();

}
displayList.forEach(...);

animateFruitCards();

const target=

choices.appendChild(btn);

});

animateButtons();

}
/*==================================
CSVダウンロード
==================================*/

function downloadCSV(){

let csv=
"試行番号,果物,正解色,回答色,正誤,回答時間(秒),日時\n";

logs.forEach(log=>{

csv +=

log.trial+","

+log.fruit+","

+COLOR_NAME[log.correctColor]+","

+COLOR_NAME[log.answerColor]+","

+(log.correct?"○":"×")+"," 

+log.time+","

+log.datetime+"\n";

});

const blob=

new Blob(

[csv],

{

type:

"text/csv;charset=utf-8"

}

);

const url=

URL.createObjectURL(blob);

const a=

document.createElement("a");

a.href=url;

a.download=

"fruit_memory_result.csv";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

}


/*==================================
データリセット
==================================*/

function resetData(){

if(

!confirm(

"すべての記録を削除しますか？"

)

){

return;

}

logs=[];

initStats();

saveData();

updateStats();

historyBody.innerHTML="";

result.innerHTML="";

question.innerHTML="";

choices.innerHTML="";

fruitsArea.innerHTML="";

countdown.innerHTML="";

}


/*==================================
起動時に画面更新
==================================*/

window.onload=()=>{

loadData();

updateStats();

};
/*==================================
背景の丸い模様
==================================*/

function createBackground(){

for(let i=0;i<18;i++){

const circle=
document.createElement("div");

circle.style.position="fixed";

circle.style.width=
40+Math.random()*80+"px";

circle.style.height=
circle.style.width;

circle.style.borderRadius="50%";

circle.style.background=
"rgba(255,255,255,.28)";

circle.style.left=
Math.random()*100+"vw";

circle.style.top=
Math.random()*100+"vh";

circle.style.zIndex="-1";

circle.style.pointerEvents="none";

document.body.appendChild(circle);

}

}


/*==================================
カードをランダムに少し傾ける
==================================*/

function decorateCards(){

const cards=
document.querySelectorAll(".card");

cards.forEach(card=>{

const deg=
(Math.random()*8)-4;

card.style.transform=
`rotate(${deg}deg)`;

});

}


/*==================================
カードの影を強くする
==================================*/

function improveCards(){

const cards=
document.querySelectorAll(".card");

cards.forEach(card=>{

card.style.boxShadow=
"0 10px 25px rgba(0,0,0,.18)";

card.style.border=
"4px solid white";

});

}

==================================*/

正解は

<b>

${COLOR_NAME[currentColor]}

</b>

でした`;

"wrong fade";

}

}
